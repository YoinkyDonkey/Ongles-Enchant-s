<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Rating / Évaluation Client</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
/* --- Root Variables --- */
:root {
  --color-primary: #d6aa77;
  --color-secondary: #f19b45;
  --color-title: #856429;
  --color-accent: #fabc75;
  --color-text: #222;
  --color-text-light: #555;
  --color-text-muted: #888;
  --color-white: #fff;
  --color-stars: #f5c518;
  --bg-body: #a03935;
  --bg-section-light: #6b2755;
  --bg-section-alt: #a56161;
  --shadow-light: rgba(0,0,0,0.05);
  --shadow-medium: rgba(0,0,0,0.1);
  --shadow-strong: rgba(0,0,0,0.3);
  --shadow-hover: rgba(196,155,108,0.6);
  --gradient-button: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
  --gradient-button-hover: linear-gradient(135deg, var(--color-secondary), var(--color-primary));
  --card-gradient: linear-gradient(135deg, #fdf6f0, #fff0e6);
}

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Cinzel', serif;
}

/* Full screen layout */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg-body);
  color: var(--color-white);
  overflow: hidden;
  position: relative;
}

.background::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(160, 57, 53, 0.75); 
  z-index: -1;
}

/* --- Rating Box --- */
.rating-box {
  text-align: center;
  padding: clamp(2rem, 5vw, 4rem) clamp(1.5rem, 5vw, 5rem);
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 2px solid var(--color-primary);
  box-shadow: 0 25px 60px var(--shadow-strong);
  max-width: 90%;
  width: 100%;
  margin: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* --- Title --- */
.rating-box h2 {
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  margin-bottom: 2rem;
  color: var(--color-primary);
  letter-spacing: 1.5px;
}

/* --- Stars --- */
.stars {
  display: flex;
  justify-content: center;
  gap: clamp(0.5rem, 3vw, 1.5rem);
  font-size: clamp(2rem, 8vw, 5rem);
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.star {
  color: #ccc;
  cursor: pointer;
  transition: transform 0.2s, color 0.2s;
  flex-shrink: 0;
}

.star.active { color: var(--color-stars); }
.star:hover { transform: scale(1.3); }

/* --- Button --- */
button {
  font-size: clamp(1.2rem, 4vw, 1.5rem);
  padding: clamp(0.8rem, 2vw, 1rem) clamp(2rem, 5vw, 3rem);
  border: none;
  border-radius: 50px;
  background: var(--gradient-button);
  color: var(--color-white);
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
  box-shadow: 0 10px 25px var(--shadow-medium);
}

button:hover {
  background: var(--gradient-button-hover);
  transform: translateY(-3px);
  box-shadow: 0 15px 35px var(--shadow-hover);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.6;
  transform: none;
  box-shadow: 0 5px 15px var(--shadow-medium);
}

/* --- Status Message --- */
#status {
  margin-top: 1.5rem;
  font-size: clamp(1rem, 3vw, 1.2rem);
  color: var(--color-accent);
}

/* --- Responsive Centering --- */
@media (max-width: 600px) {
  .rating-box {
    padding: 2rem 1.5rem;
  }

  .stars {
    font-size: 4rem;
    gap: 1rem;
  }

  button {
    font-size: 1rem;
    width: 100%;
    text-align: center;
  }
}
</style>
</head>

<body>
<div class="background"></div>

<div class="rating-box">
  <h2>Rate Your Experience / Évaluez votre expérience</h2>

  <div class="stars">
    <span class="star" data-value="1">★</span>
    <span class="star" data-value="2">★</span>
    <span class="star" data-value="3">★</span>
    <span class="star" data-value="4">★</span>
    <span class="star" data-value="5">★</span>
  </div>

  <button onclick="sendRating()">Send Rating / Envoyer l'évaluation</button>

  <p id="status"></p>
</div>

<script>
let rating = 0;
const stars = document.querySelectorAll(".star");
const button = document.querySelector("button");

// Select star rating
stars.forEach(star => {
  star.addEventListener("click", () => {
    rating = star.dataset.value;
    stars.forEach((s,i) => s.classList.toggle("active", i < rating));
  });
});

// Send rating to Apps Script
function sendRating() {
  if(rating == 0){
    alert("Please select a rating first! / Veuillez d'abord sélectionner une note !");
    return;
  }

  // Disable the button immediately
  button.disabled = true;
  button.innerText = "Sending... / Envoi...";

  fetch("https://script.google.com/macros/s/AKfycbymGnP4UrJdNF9L51fWO_X8m5YzAKEnTTzCDz5audavfg7f2yroVht0gdfFxOFVR-Yw/exec", {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ rating: rating })
  })
  .then(() => {
    document.getElementById("status").innerText = "✅ Rating submitted! / Évaluation envoyée !";
    stars.forEach(s => s.classList.remove("active"));
    rating = 0;
    button.innerText = "Send Rating / Envoyer l'évaluation";
    button.disabled = false; // Re-enable if you want user to rate again
  })
  .catch(err => {
    console.error(err);
    document.getElementById("status").innerText = "❌ Error sending rating / Erreur lors de l'envoi";
    button.innerText = "Send Rating / Envoyer l'évaluation";
    button.disabled = false; // Allow retry
  });
}
</script>

</body>
</html>
